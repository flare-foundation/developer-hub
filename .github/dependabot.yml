version: 2
updates:
  # Base npm (Developer Hub)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary

    allow:
      - dependency-type: "direct"

    groups:
      base-npm:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 3

    groups:
      actions:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # Automations (uv)
  - package-ecosystem: "uv"
    directory: "/automations/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 2

    groups:
      automations-uv:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # Examples (Python / uv)
  - package-ecosystem: "uv"
    directory: "/examples/developer-hub-python/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 2

    groups:
      examples-uv:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # Examples (JavaScript / npm)
  - package-ecosystem: "npm"
    directory: "/examples/developer-hub-javascript/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary

    allow:
      - dependency-type: "direct"

    groups:
      examples-js:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # Examples (Go / gomod)
  - package-ecosystem: "gomod"
    directory: "/examples/developer-hub-go/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 2

    groups:
      examples-go:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # Examples (Rust / cargo)
  - package-ecosystem: "cargo"
    directory: "/examples/developer-hub-rust/"
    schedule:
      interval: "monthly"

    open-pull-requests-limit: 2

    groups:
      examples-rust:
        patterns: ["*"]

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
